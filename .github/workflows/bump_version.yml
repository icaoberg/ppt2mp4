name: Bump Version and Release

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: current
        run: |
          VERSION=$(grep -m1 '^VERSION=' ppt2movie | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          NEXT=$(python3 -c "v=round(float('${{ steps.current.outputs.version }}') + 0.1, 10); print(f'{v:.1f}')")
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update version in ppt2movie script
        run: |
          sed -i 's/^VERSION=".*"/VERSION="${{ steps.next.outputs.version }}"/' ppt2movie

      - name: Update version in README.md
        run: |
          sed -i 's/^\*\*Version .*\*\*/**Version ${{ steps.next.outputs.version }}**/' README.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ppt2movie README.md
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }}"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next.outputs.version }}
          name: v${{ steps.next.outputs.version }}
          body: |
            Automated release for version ${{ steps.next.outputs.version }}.
          generate_release_notes: true
